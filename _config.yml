# The Site Configuration

theme: jekyll-theme-chirpy

lang: en
timezone: Europe/London

title: Uğur Kılıç
tagline: "iOS Engineer · London"
description: >-
  iOS Engineer based in London. Notes on Swift, iOS, and indie apps.

url: "https://urklc.github.io"
baseurl: ""

github:
  username: urklc

twitter:
  username: _urklc

social:
  name: Uğur Kılıç
  email: ""
  links:
    - https://github.com/urklc
    - https://www.linkedin.com/in/ugurkilic
    - https://www.youtube.com/@urklc
    - https://twitter.com/_urklc

# Site avatar (served from local assets)
avatar: /assets/img/avatar.jpg

# Google Analytics
analytics:
  google:
    id: G-XQE7W2KV3T

# Comments engine — disabled
comments:
  provider:

# Post and page settings
permalink: /:title/
paginate: 10

# Site theme: 'light', 'dark', or '' (auto)
theme_mode:

# The CDN endpoint for media resources — use local serving
cdn: ""

# the avatar on sidebar, support local file or CORS resources
img_cdn: ""

# Default values for posts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

collections:
  tabs:
    output: true
    sort_by: order

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json
  - docs

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
